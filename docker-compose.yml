services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  quiz-backend:
    image: ghcr.io/einmanuu/quiz-backend:latest
    env_file: ./.env
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  quiz-frontend:
    image: ghcr.io/einmanuu/quiz-frontend:latest
    env_file: ./.env
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - quiz-backend

volumes:
  postgres_data:
