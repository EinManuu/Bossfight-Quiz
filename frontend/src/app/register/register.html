<div class="page">
    <div class="left-panel">
        <div class="brand">
            <span class="brand-icon">&#9876;</span>
            <span class="brand-name">CyberForce</span>
        </div>
        <h2 class="tagline">Register and join the training.</h2>
        <p class="tagline-sub">Choose a username and your password will be set automatically to <strong>bip2026</strong>.</p>
    </div>

    <div class="right-panel">
        <form class="form" (ngSubmit)="onRegister()">
            <h1 class="form-title">Create account</h1>
            <p class="form-sub">Your default password is <strong>bip2026</strong></p>

            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" [(ngModel)]="username" placeholder="Enter a username" autocomplete="username" />
            </div>

            <div class="field">
                <label for="role">Department</label>
                <select id="role" name="role" [(ngModel)]="role">
                    <option value="IT">IT</option>
                    <option value="Finance">Finance</option>
                </select>
            </div>

            @if (message) {
                <p class="success">{{ message }}</p>
            }
            @if (error) {
                <p class="error">{{ error }}</p>
            }

            <button type="submit" class="submit-btn">Register</button>
            <p class="small-text">Already signed up? <a href="/">Login</a></p>
        </form>
    </div>
</div>
