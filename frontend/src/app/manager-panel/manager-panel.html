<div class="page">
  <!-- Header -->
  <header class="panel-header">
    <button class="back-btn" (click)="goHome()">&#8592; Home</button>
    <span class="panel-label">&#9881; Admin Panel</span>
    <span></span>
  </header>

  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab-btn" [class.active]="tab === 0" (click)="tab = 0">&#10067; Questions</button>
    <button class="tab-btn" [class.active]="tab === 1" (click)="tab = 1">&#128126; Boss</button>
  </div>

  <!-- Content -->
  <div class="panel-body">
    @if (tab === 0) {
      <app-create-questions></app-create-questions>
    }
    @if (tab === 1) {
      <app-create-boss></app-create-boss>
    }
  </div>
</div>
