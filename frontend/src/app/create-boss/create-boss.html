<!-- Card -->
<div class="card">


  <!-- Name -->
  <div class="section">
    <label>Name</label>
    <input type="text" placeholder="Enter the name of the Boss">
  </div>

  <div class="section">
    <label>Description</label>
    <textarea class="text-area" cols="35"></textarea>

  </div>

  <div class="section">
    <label>Healthpoints</label>
    <input type="number" placeholder="Enter the HP">
  </div>


  <div class="section">
    <label>End of the fight:</label>
    <input type="datetime-local" placeholder="Enter the Duration of the Event in ">
  </div>

  <!-- Button -->
  <button class="next-btn">Create</button>

</div>
